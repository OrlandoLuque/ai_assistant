<!DOCTYPE html>
<!--
  MCP Tool Catalog - AI Assistant
  Shows all MCP-exposable tools, resources and prompts available in the crate.

  BACKUP POLICY: Before making significant changes to this file (new tools,
  category restructuring, parameter changes, etc.), ALWAYS create a
  timestamped copy first:
    mcp_catalog_YYYY-MM-DD_HHMM_<brief-description>.html
  Keep all historical copies in this same docs/ folder.

  History:
    - mcp_catalog.html  (v1: initial catalog, 29 capabilities)
    - mcp_catalog_2026-02-20_1430_pre-phase8-docs.html (v1 backup before phase-8 updates)
    - mcp_catalog.html  (v2: +structured output, model registry, benchmarks, browser/distributed exports)
-->
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Assistant - Catálogo MCP</title>
<style>
  :root {
    --core: #2563eb;
    --auto: #7c3aed;
    --available: #059669;
    --feature: #d97706;
    --na: #9ca3af;
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #334155;
    --text: #f1f5f9;
    --text-dim: #94a3b8;
    --border: #475569;
    --accent: #3b82f6;
    --accent2: #8b5cf6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 20px;
    min-height: 100vh;
    line-height: 1.5;
  }

  h1 {
    text-align: center;
    font-size: 1.6rem;
    margin-bottom: 6px;
    background: linear-gradient(135deg, #60a5fa, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    text-align: center;
    color: var(--text-dim);
    font-size: 0.85rem;
    margin-bottom: 20px;
  }

  /* Protocol banner */
  .protocol-banner {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .protocol-stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 20px;
    text-align: center;
    min-width: 140px;
  }

  .protocol-stat .value {
    font-size: 1.4rem;
    font-weight: 700;
    color: #60a5fa;
  }

  .protocol-stat .label {
    font-size: 0.72rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* Filter tabs */
  .tab-bar {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .tab-btn {
    padding: 7px 18px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: transparent;
    color: var(--text-dim);
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
  }

  .tab-btn:hover { border-color: #60a5fa; color: #60a5fa; }
  .tab-btn.active { background: #1e3a5f; border-color: var(--accent); color: #93c5fd; }

  .tab-btn .count {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: rgba(59,130,246,0.2);
    color: #93c5fd;
    border-radius: 10px;
    padding: 0 7px;
    font-size: 0.7rem;
    font-weight: 600;
    margin-left: 6px;
    min-width: 20px;
    height: 18px;
  }

  /* Category section */
  .category {
    margin-bottom: 24px;
  }

  .category-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px 10px 0 0;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }

  .category-header:hover { background: #253347; }

  .category-header .icon { font-size: 1.2rem; }

  .category-header h2 {
    font-size: 1rem;
    color: #93c5fd;
    flex: 1;
  }

  .category-header .badge {
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 0.72rem;
    font-weight: 600;
  }

  .badge-feature { background: rgba(217,119,6,0.25); color: #fcd34d; }
  .badge-core { background: rgba(37,99,235,0.25); color: #93c5fd; }

  .category-header .collapse-icon {
    font-size: 0.8rem;
    color: var(--text-dim);
    transition: transform 0.2s;
  }

  .category.collapsed .collapse-icon { transform: rotate(-90deg); }
  .category.collapsed .category-body { display: none; }

  .category-body {
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 10px 10px;
    overflow: hidden;
  }

  .category-desc {
    padding: 10px 16px;
    font-size: 0.8rem;
    color: var(--text-dim);
    background: rgba(30,41,59,0.5);
    border-bottom: 1px solid var(--border);
  }

  /* Tool card */
  .tool-card {
    display: grid;
    grid-template-columns: 1fr;
    padding: 14px 16px;
    border-bottom: 1px solid rgba(71,85,105,0.4);
    transition: background 0.1s;
    cursor: pointer;
  }

  .tool-card:last-child { border-bottom: none; }
  .tool-card:hover { background: rgba(37,99,235,0.06); }
  .tool-card.expanded { background: rgba(37,99,235,0.04); }

  .tool-summary {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .tool-name {
    font-weight: 700;
    font-size: 0.88rem;
    color: #e2e8f0;
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  }

  .tool-type-badge {
    padding: 2px 8px;
    border-radius: 8px;
    font-size: 0.65rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .type-tool { background: rgba(37,99,235,0.2); color: #93c5fd; }
  .type-resource { background: rgba(5,150,105,0.2); color: #6ee7b7; }
  .type-prompt { background: rgba(124,58,237,0.2); color: #c4b5fd; }

  .tool-desc {
    flex: 1;
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-left: auto;
    text-align: right;
  }

  .tool-expand-icon {
    color: var(--text-dim);
    font-size: 0.7rem;
    transition: transform 0.2s;
    margin-left: 8px;
  }

  .tool-card.expanded .tool-expand-icon { transform: rotate(90deg); }

  .tool-details {
    display: none;
    margin-top: 12px;
    padding: 14px;
    background: var(--bg);
    border-radius: 8px;
    font-size: 0.8rem;
  }

  .tool-card.expanded .tool-details { display: block; }

  .detail-section { margin-bottom: 10px; }
  .detail-section:last-child { margin-bottom: 0; }

  .detail-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    margin-bottom: 4px;
    font-weight: 600;
  }

  .params-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.78rem;
  }

  .params-table th {
    text-align: left;
    padding: 5px 10px;
    background: rgba(30,41,59,0.8);
    color: #93c5fd;
    font-weight: 600;
    font-size: 0.72rem;
    border-bottom: 1px solid var(--border);
  }

  .params-table td {
    padding: 5px 10px;
    border-bottom: 1px solid rgba(71,85,105,0.3);
    vertical-align: top;
  }

  .param-name {
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    color: #fbbf24;
    font-weight: 600;
  }

  .param-type {
    color: #a78bfa;
    font-size: 0.72rem;
  }

  .param-required {
    display: inline-block;
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 0.62rem;
    font-weight: 700;
    text-transform: uppercase;
  }

  .req-yes { background: rgba(225,29,72,0.2); color: #fb7185; }
  .req-no { background: rgba(156,163,175,0.15); color: #9ca3af; }

  .detail-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .detail-tag {
    padding: 3px 10px;
    border-radius: 6px;
    font-size: 0.72rem;
    font-weight: 500;
  }

  .tag-feature { background: rgba(217,119,6,0.15); color: #fbbf24; border: 1px solid rgba(217,119,6,0.3); }
  .tag-sandbox { background: rgba(225,29,72,0.12); color: #fb7185; border: 1px solid rgba(225,29,72,0.25); }
  .tag-platform { background: rgba(5,150,105,0.12); color: #6ee7b7; border: 1px solid rgba(5,150,105,0.25); }
  .tag-module { background: rgba(37,99,235,0.12); color: #93c5fd; border: 1px solid rgba(37,99,235,0.25); }

  .detail-note {
    font-size: 0.78rem;
    color: var(--text-dim);
    line-height: 1.5;
    padding: 6px 0;
  }

  /* Search */
  .search-bar {
    display: flex;
    justify-content: center;
    margin-bottom: 18px;
  }

  .search-input {
    width: 400px;
    max-width: 90vw;
    padding: 10px 16px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    color: var(--text);
    font-size: 0.88rem;
    transition: border-color 0.15s;
  }

  .search-input:focus { outline: none; border-color: var(--accent); }
  .search-input::placeholder { color: #64748b; }

  /* Responsive */
  @media (max-width: 768px) {
    body { padding: 10px; }
    h1 { font-size: 1.2rem; }
    .tool-summary { flex-wrap: wrap; }
    .tool-desc { text-align: left; margin-left: 0; margin-top: 4px; }
    .protocol-banner { gap: 10px; }
    .protocol-stat { min-width: 100px; padding: 8px 12px; }
  }
</style>
</head>

<div class="protocol-banner" id="banner"></div>

<div class="search-bar">

<div class="tab-bar" id="tabBar"></div>

<div id="catalogContainer"></div>

// ============================================================
// STATE
// ============================================================

let activeTab = 'all';
let searchTerm = '';

// ============================================================
// RENDERING
// ============================================================

function countItems(catId) {
  if (catId === 'all') return CATEGORIES.reduce((sum, c) => sum + c.items.length, 0);
  const cat = CATEGORIES.find(c => c.id === catId);
  return cat ? cat.items.length : 0;
}

function countByType(type) {
  return CATEGORIES.reduce((sum, c) => sum + c.items.filter(i => i.type === type).length, 0);
}

function renderBanner() {
  const el = document.getElementById('banner');
  const totalTools = countByType('tool');
  const totalResources = countByType('resource');
  const totalPrompts = countByType('prompt');
  const total = totalTools + totalResources + totalPrompts;

  el.innerHTML = `
    <div class="protocol-stat"><div class="value">${total}</div><div class="label">Capacidades MCP</div></div>
    <div class="protocol-stat"><div class="value">${totalTools}</div><div class="label">Tools</div></div>
    <div class="protocol-stat"><div class="value">${totalResources}</div><div class="label">Resources</div></div>
    <div class="protocol-stat"><div class="value">${totalPrompts}</div><div class="label">Prompts</div></div>
    <div class="protocol-stat"><div class="value">2024-11-05</div><div class="label">MCP Version</div></div>
    <div class="protocol-stat"><div class="value">2431</div><div class="label">Tests</div></div>
    <div class="protocol-stat"><div class="value">6</div><div class="label">Benchmarks</div></div>
    <div class="protocol-stat"><div class="value">19</div><div class="label">Examples</div></div>
  `;
}

function renderTabs() {
  const el = document.getElementById('tabBar');
  const tabs = [
    { id: 'all', label: 'Todos' },
    { id: 'tool', label: 'Tools', filter: 'type' },
    { id: 'resource', label: 'Resources', filter: 'type' },
    { id: 'prompt', label: 'Prompts', filter: 'type' },
    { id: 'sep', label: '|' },
  ];

  CATEGORIES.forEach(c => tabs.push({ id: c.id, label: c.name }));

  el.innerHTML = tabs.map(t => {
    if (t.id === 'sep') return '<span style="color:var(--border);font-size:1.2rem;line-height:2">|</span>';
    const count = t.filter === 'type' ? countByType(t.id) : (t.id === 'all' ? countItems('all') : countItems(t.id));
    return `<button class="tab-btn${activeTab === t.id ? ' active' : ''}" onclick="setTab('${t.id}')">${t.label}<span class="count">${count}</span></button>`;
  }).join('');
}

function matchesSearch(item) {
  if (!searchTerm) return true;
  const s = searchTerm.toLowerCase();
  return item.name.toLowerCase().includes(s)
    || item.desc.toLowerCase().includes(s)
    || (item.module && item.module.toLowerCase().includes(s))
    || (item.notes && item.notes.toLowerCase().includes(s))
    || (item.params && item.params.some(p => p.name.toLowerCase().includes(s)));
}

function matchesTab(cat, item) {
  if (activeTab === 'all') return true;
  if (activeTab === 'tool' || activeTab === 'resource' || activeTab === 'prompt') return item.type === activeTab;
  return cat.id === activeTab;
}

function renderCatalog() {
  const container = document.getElementById('catalogContainer');
  let html = '';

  CATEGORIES.forEach(cat => {
    const visibleItems = cat.items.filter(item => matchesTab(cat, item) && matchesSearch(item));
    if (visibleItems.length === 0) return;

    html += `<div class="category" id="cat-${cat.id}">`;
    html += `<div class="category-header" onclick="toggleCategory('${cat.id}')">`;
    html += `<span class="icon">${cat.icon}</span>`;
    html += `<h2>${cat.name}</h2>`;
    html += `<span class="badge ${cat.featureInFull ? 'badge-core' : 'badge-feature'}">${cat.feature}${cat.featureInFull ? ' (in full)' : ''}</span>`;
    html += `<span class="collapse-icon">\u25BC</span>`;
    html += `</div>`;
    html += `<div class="category-body">`;
    html += `<div class="category-desc">${cat.desc}</div>`;

    visibleItems.forEach(item => {
      const typeClass = item.type === 'tool' ? 'type-tool' : item.type === 'resource' ? 'type-resource' : 'type-prompt';
      html += `<div class="tool-card" onclick="toggleCard(this)">`;
      html += `<div class="tool-summary">`;
      html += `<span class="tool-type-badge ${typeClass}">${item.type}</span>`;
      html += `<span class="tool-name">${item.name}</span>`;
      html += `<span class="tool-desc">${item.desc}</span>`;
      html += `<span class="tool-expand-icon">\u25B6</span>`;
      html += `</div>`;

      // Details (hidden by default)
      html += `<div class="tool-details">`;

      // Parameters
      if (item.params && item.params.length > 0) {
        html += `<div class="detail-section">`;
        html += `<div class="detail-label">Par\u00e1metros</div>`;
        html += `<table class="params-table"><tr><th>Nombre</th><th>Tipo</th><th>Req.</th><th>Descripci\u00f3n</th></tr>`;
        item.params.forEach(p => {
          html += `<tr>`;
          html += `<td><span class="param-name">${p.name}</span></td>`;
          html += `<td><span class="param-type">${p.type}</span></td>`;
          html += `<td><span class="param-required ${p.required ? 'req-yes' : 'req-no'}">${p.required ? 'req' : 'opt'}</span></td>`;
          html += `<td>${p.desc}</td>`;
          html += `</tr>`;
        });
        html += `</table></div>`;
      } else {
        html += `<div class="detail-section"><div class="detail-label">Par\u00e1metros</div><div class="detail-note">Sin par\u00e1metros</div></div>`;
      }

      // Tags
      html += `<div class="detail-section"><div class="detail-label">Metadata</div><div class="detail-tags">`;
      html += `<span class="detail-tag tag-module">${item.module}</span>`;
      html += `<span class="detail-tag tag-feature">${cat.feature}</span>`;
      if (item.feature_extra) html += `<span class="detail-tag tag-feature">${item.feature_extra}</span>`;
      if (item.sandbox) html += `<span class="detail-tag tag-sandbox">\uD83D\uDEE1\uFE0F sandbox: ${item.sandbox}</span>`;
      if (item.platform) html += `<span class="detail-tag tag-platform">\uD83D\uDDA5\uFE0F platform-specific</span>`;
      html += `</div></div>`;

      // Notes
      if (item.notes) {
        html += `<div class="detail-section"><div class="detail-label">Notas</div><div class="detail-note">${item.notes}</div></div>`;
      }

      html += `</div>`; // tool-details
      html += `</div>`; // tool-card
    });

    html += `</div></div>`; // category-body, category
  });

  container.innerHTML = html;
}

// ============================================================
// INTERACTIONS
// ============================================================

function setTab(id) {
  activeTab = id;
  renderTabs();
  renderCatalog();
}

function filterCards() {
  searchTerm = document.getElementById('searchInput').value;
  renderCatalog();
}

function toggleCategory(catId) {
  const el = document.getElementById('cat-' + catId);
  if (el) el.classList.toggle('collapsed');
}

function toggleCard(cardEl) {
  cardEl.classList.toggle('expanded');
}

// ============================================================
// INIT
// ============================================================

renderBanner();
renderTabs();
renderCatalog();
</script>
