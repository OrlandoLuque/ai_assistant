[dev-dependencies]
tempfile = "3"
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "core_benchmarks"
harness = false

# === Release profile optimizations ===
[profile.release]
# Enable Link-Time Optimization for better dead code elimination
lto = true
# Single codegen unit for maximum optimization
codegen-units = 1
# Optimize for size with good performance
opt-level = "z"
# Strip symbols from binary
strip = true
# Abort on panic (smaller binary, no unwinding)
panic = "abort"

[profile.release-fast]
inherits = "release"
# Optimize for speed instead of size
opt-level = 3
# Keep panic unwinding for better debugging
panic = "unwind"

# === Protected release profile (anti-reverse engineering) ===
[profile.release-protected]
inherits = "release"
# Fat LTO for maximum optimization and code merging (harder to analyze)
lto = "fat"
# Single codegen unit merges all code (harder to identify module boundaries)
codegen-units = 1
# Size optimization also obscures code patterns
opt-level = "z"
# Strip all symbols and debug info
strip = "symbols"
# No panic messages or unwinding (less string leakage)
panic = "abort"
# Overflow checks disabled in release (smaller, faster)
overflow-checks = false

# Metadata for downstream crates and build scripts
[package.metadata.protected-build]
# Post-build steps for maximum protection
upx_enabled = true
upx_flags = ["--best", "--lzma"]
sign_binary = true
verify_at_startup = true
